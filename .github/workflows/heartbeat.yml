# Cortex V2 — Heartbeat diario E2 con ablacion completa
# Pre-registro OSF: https://osf.io/wdkcx
# Condiciones: A (Cortex completo) B (LLM base) C (Phi+Omega+Kappa) D (Kappa+Rho)

name: cortex-heartbeat

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      conditions:
        description: 'Condiciones (A,B,C,D)'
        required: false
        default: 'A,B,C,D'

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar secrets
        run: |
          [ -z "$OPENROUTER_API_KEY" ] && echo "FALTA OPENROUTER_API_KEY" && exit 1
          [ -z "$ALPACA_API_KEY" ]     && echo "FALTA ALPACA_API_KEY" && exit 1
          echo "Secrets: OK | OpenRouter: ${OPENROUTER_API_KEY:0:8}..."
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}

      - name: Crear directorios
        run: mkdir -p logs data/memory data/checkpoints

      - name: Ejecutar E2 ablacion
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     https://paper-api.alpaca.markets/v2
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
          MODEL_PHI:    anthropic/claude-sonnet-4-6
          MODEL_OMEGA:  anthropic/claude-opus-4-6
          MODEL_KAPPA:  anthropic/claude-haiku-4-5
          MODEL_XI:     anthropic/claude-haiku-4-5
          MODEL_SIGMA:  anthropic/claude-sonnet-4-6
        run: |
          CONDITIONS="${{ github.event.inputs.conditions || 'A,B,C,D' }}"
          python -c "
conditions = [c.strip() for c in '$CONDITIONS'.split(',') if c.strip()]
print(f'Condiciones: {conditions}')
from cortex.e2_ablation import run_e2_ablation
results = run_e2_ablation(conditions)
errors = [c for c,r in results.items() if 'error' in r]
if errors:
    print(f'ADVERTENCIA condiciones con error: {errors}')
print('E2 ablacion OK')
"

      - name: Publicar logs
        run: |
          git config user.name  "cortex-bot"
          git config user.email "cortex-bot@users.noreply.github.com"
          git add logs/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            DATE=$(date +%Y-%m-%d)
            SUMMARY=$(python3 -c "
import json, glob
files = sorted(glob.glob('logs/e2_ablation_*.jsonl'))
if not files: exit(0)
parts = []
for l in open(files[-1]):
    d = json.loads(l.strip())
    parts.append(f\"{d.get('condition','?')}:{d.get('decision','?')}({d.get('confidence',d.get('delta',0)):.3f})\")
print(' | '.join(parts))" 2>/dev/null || echo "")
            git commit -m "obs: E2 $DATE | $SUMMARY"
            git push
          fi
