# Cortex V2 — Heartbeat diario E2
# Pre-registro OSF: https://osf.io/wdkcx
# Cron: 09:00 UTC lunes-viernes

name: cortex-heartbeat

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

# FIX 403: GITHUB_TOKEN necesita permiso de escritura explícito
permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        # No usar persist-credentials: false — necesitamos el token por defecto

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar secrets
        run: |
          echo "Verificando secrets..."
          [ -z "$OPENROUTER_API_KEY" ] && echo "FALTA OPENROUTER_API_KEY" && exit 1
          [ -z "$ALPACA_API_KEY" ]     && echo "FALTA ALPACA_API_KEY" && exit 1
          echo "Secrets: OK"
          echo "OpenRouter: ${OPENROUTER_API_KEY:0:8}..."
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}

      - name: Crear directorios
        run: mkdir -p logs data/memory data/checkpoints

      - name: Ejecutar pipeline Cortex V2
        env:
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_BASE_URL:     https://paper-api.alpaca.markets/v2
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
          MODEL_PHI:    anthropic/claude-sonnet-4-6
          MODEL_OMEGA:  anthropic/claude-opus-4-6
          MODEL_KAPPA:  anthropic/claude-haiku-4-5
          MODEL_XI:     anthropic/claude-haiku-4-5
          MODEL_SIGMA:  anthropic/claude-sonnet-4-6
        run: python -m cortex.pipeline

      - name: Publicar logs en GitHub
        run: |
          git config user.name  "cortex-bot"
          git config user.email "cortex-bot@users.noreply.github.com"
          git add logs/ || true
          if git diff --staged --quiet; then
            echo "Sin cambios — nada que publicar"
          else
            DATE=$(date +%Y-%m-%d)
            DELTA=$(python3 -c "
import json, glob, sys
files = sorted(glob.glob('logs/cortex_*.jsonl'))
if not files: sys.exit(0)
lines = [l for l in open(files[-1]) if l.strip()]
if lines:
    d = json.loads(lines[-1])
    print(f\"delta={d.get('delta','?')} regime={d.get('regime','?')} signal={d.get('signal','?')}\")" 2>/dev/null || echo "")
            git commit -m "obs: heartbeat $DATE | $DELTA"
            git push
            echo "Publicado: $DATE"
          fi
